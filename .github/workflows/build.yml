name: Build and push vLLM images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-32b:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push 32B
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/defin/oc1-vllm:32b
          cache-from: type=gha,scope=32b
          cache-to: type=gha,mode=max,scope=32b

  build-3b:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push 3B
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.3b
          push: true
          tags: ghcr.io/defin/oc1-vllm:3b
          cache-from: type=gha,scope=3b
          cache-to: type=gha,mode=max,scope=3b
