events {}
http {
    server {
        listen 3333;

        # 32B chat model (default)
        location /v1/ {
            proxy_pass         http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_buffering    off;
            proxy_read_timeout 600s;
        }

        # 3B completion model
        location /complete/v1/ {
            rewrite ^/complete(/.*)$ $1 break;
            proxy_pass         http://127.0.0.1:8001;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_buffering    off;
            proxy_read_timeout 120s;
        }
    }
}
